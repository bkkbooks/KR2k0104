body:
  text: 果類檳榔樹高十餘丈皮似青銅節如桂竹下本不大上枝不小調直亭亭千萬若一森秀無柯端頂有葉葉似甘蕉條泒開破仰望眇眇如插叢蕉於竹抄風至獨動似舉羽扇之掃天葉下繫數房房綴數十實實大如桃李天生棘重纍其下所以禦衛其實也味苦澀剖其皮鬻其膚熟如貫珠堅如乾棗以扶留藤古賁灰并食則滑美下氣消穀出林邑彼人以為貴婚族客必先進若邂逅不設用相嫌恨一名賓門藥餞荔枝樹高五六丈餘如桂樹緣葉蓬蓬冬夏榮茂青華朱實實大如雞子核黃黑似熟蓮實白如肪甘而多汁似安石榴有甜酢者至日將中翕然俱赤則可食也一樹下子百斛三輔黃圖曰漢武帝元鼎六年破南越建扶荔官扶荔者以荔枝得名也自交趾移植百株於庭無一生者連年移植不息後數歲偶一株稍茂然終無華實帝亦珍惜之一旦忽萎死守吏坐誅死者數十遂不復茂矣其實則歲貢焉郵傳者疲斃於道極為生民之患椰樹葉如栟櫚高六七丈無枝條其實大如寒瓜外有粗皮次有殼圓而且堅剖之有白膚厚半寸味似胡桃而極肥美有漿飲之得醉俗謂之越王頭云昔林邑王與越王有故怨遣俠客刺得其首懸之于樹俄化為椰子林邑王憤之命剖以為飲器當刺時越王大醉故其漿猶如酒云楊梅其子如彈丸正赤五月中熟熟時似梅其味甜酸陸賈南越行紀曰羅浮山頂有胡楊梅山桃繞其際海人時登採拾止得於上飽噉不得持下東方朔林邑記曰林邑山楊梅其大如杯碗青時極酸既紅味如崖蜜以醞酒號梅香酎非貴人重客不得飲之橘白華赤實皮馨香有美味自漢武帝交趾有橘官長一人秩二百石主貢御橘吳黃武中交趾太守士燮獻橘十七實同一蒂以為瑞異郡臣畢賀柑柑乃橘之屬滋味甘美特異者也有黃者有頳者頳者謂之壺柑交趾人以席囊貯蟻鬻於市者其窠如薄絮囊皆連枝葉蟻在其中并窠而賣蟻赤黃色大於常蟻南方柑樹若無此蟻則其實皆為群蠹所傷無復一完者矣今華林園有柑二株遇結實上命群臣宴飲于旁摘而分賜焉橄欖樹身聳枝皆高數丈其子深秋方熟味雖苦澀咀之芬馥勝含雞骨香吳時歲貢以賜近侍本朝自泰康後亦如之龍眼樹如荔枝但枝葉稍小殼青黃色形圓如彈丸核如木梡子而不堅肉白而帶漿其甘如蜜一朵五六十顆作穗如莆萄然荔枝過即龍眼熟故謂之荔枝奴言常隨其後也東觀漢記曰單于來朝賜橙橘龍眼荔枝魏文帝詔群臣曰南方果之珍異者有龍眼荔枝令歲貢焉出九真交趾海棗海棘樹身無間枝直聳三四十丈樹頂四面共生十餘枝葉如栟櫚五年一實實甚大如柸碗核兩頭不尖雙卷而圓其味極甘美安邑御棗無以加也泰康五年林邑獻百枚昔李少君謂漢武帝曰臣嘗遊海上見安期生食臣棗大如瓜非誕説也千歲子有藤蔓出土子在根下鬚緑色交加如織其子一苞恆二百餘顆皮殼青黃色殼中有肉如栗味亦如之乾者殼肉相離撼之有聲似肉豆蔻出交趾五斂子大如木瓜黃色皮肉脆軟味極酸上有五稜如刻出南人呼稜為斂故以為名以蜜漬之甘酢而美出南海鉤緣子形如瓜皮似橙而金色胡人重之極芬香肉甚厚白如蘆蔔女工競雕鏤花鳥漬以蜂蜜點燕檀巧麗妙絶無與為比泰康五年大秦貢十御帝以三御賜王愷助其珍味夸示於石崇海梧子樹與中國松同但結實絶大形如小栗三角肥甘香味亦樽俎間佳果也出林邑菴摩勒樹葉細似合昏花黃實似李青黃色核圓作六七稜食之先苦後甘術士以變白鬚髮有驗出九真石栗樹與栗同但生於山石鏬間花開三年方結實其殼厚而肉少其味似胡桃仁熟時或為群鸚鵡至啄食略盡故彼人多珍貴之出日南人面子樹似含桃結子如桃實無味其核正如人面故以為名以蜜漬之稍可食以其核可玩於席間飣餖禦客出南海雲丘竹一節為船出扶南然今交廣有竹節長二丈其圍一二丈者往往有之𥯨簩竹皮薄而空多大者徑不過二寸皮粗澀以鎊犀象利勝於鐵出大秦石林竹似桂竹徑而利削為刀割象皮如切芋出九真交趾思摩竹如竹大而筍生其節筍既成竹春而荀復生節焉交廣所在有之簞竹葉疏而大一節相去五六尺出九真彼人取嫩者捶浸紡績為布謂之竹疏布越王竹根生石上若細荻高尺餘南海有之南人愛其青色用為酒籌云越王棄餘算而竹生
