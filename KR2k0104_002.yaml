body:
  text: 木類楓人五嶺之間多楓木歲久則生瘤癭一夕遇慕雷驟雨其樹贅暗長三五尺謂之楓人越巫取之作術有通神之驗取之不以法則能化去楓香樹似白楊葉圓而歧分有脂而香其子大如鴨卵二月華發乃著實八九月熟曝乾可燒惟九真郡有之薰陸香出大秦在海邊有大樹枝葉正如古松生於沙中盛夏樹膠流出沙上方採之榕榕樹南海桂林多植之葉如木麻實如冬青樹幹拳曲是不可以為器也其本稜理而深是不可以為材也燒之無焰是不可以為薪也以其不材故能久而無傷其蔭十畝故人以為息焉而又枝條既繁葉又茂細軟條如藤垂下漸漸及地藤稍入地便生根節或一大株有根四五處而橫枝及鄰樹即連理南人以為常不謂之瑞木益智子如筆毫長七八分二月花色若蓮著實五六月熟味辛雜五味中芬芳亦可鹽曝出交趾合浦建安八年交州刺史張津嘗以益智子粽餉魏武帝桂出合浦生必以高山之巔冬夏常青其類自為林間無雜樹交趾置桂園桂有三種葉如柏葉皮赤者為丹桂葉似柿葉者為茵桂其葉似枇杷葉者為牡桂三輔黃圖曰甘泉宮南有昆明池池中有靈波殿以桂為柱風來自香朱槿朱槿花莖葉皆如桑葉光而厚樹高止四五尺而枝葉婆娑自二月開花至中冬即歇其花深紅色五出大如蜀葵有蕊一條長於花葉上綴金屑日光所爍疑若焰生一叢之上日開數百朵朝開暮落插枝即活出高涼郡一名赤槿一名日及指甲花其樹高五六尺枝條柔弱葉如嫩榆與耶悉茗末利花皆雪白而香不相上下亦胡人自大秦國移稙于南海而此花極繁細才如半米粒許彼人多折置襟袖間蓋資其芬馥爾一名散沫花密香沉香雞骨香黃熟香雞舌香棧香青桂香馬蹄香案此八物同出於一樹也交趾有蜜香樹幹似匱柳其花白而繁其葉如橘欲取香伐之經年其根幹枝節各有別色也木心與節堅黑沉水者為沉香與水面平者為雞骨香其根為黃熟香其幹為棧香細枝緊實未爛者為青桂香其根節輕而大者為馬蹄香其花不香成實乃香為雞舌香珍異之木也桄榔樹似栟櫚實其皮可作綆得水則柔韌胡人以此聯木為舟皮中有屑如麵多者至數斛食之與常麵無異木性如竹紫黑色有文理工人解之以製奕枰出九真交趾訶梨勒樹似木梡花白子形如橄欖六路皮肉相著可作飲變白髭髮令黑出九真蘇枋樹類槐花黑子出九真南人以染綘清以大庾之水則色愈深水松葉如橧而細長出南海土産衆香而此木不大香故彼人無佩服者嶺北人極愛之然其香殊勝在南方時植物無情者也不香於彼而香於此豈屈於不知己而伸於知巳者歟物理之難窮如此刺桐刺桐其木為材三月三時布葉繁密後有花赤色間生葉間旁照他物皆朱殷然三五房凋則三五復發如是者竟歲九真有之棹樹幹葉俱似椿以其葉鬻汁漬果呼為棹汁若以棹汁雜彘肉食者即時為雷震死棹出高涼郡杉一名披煔合浦東二百里有杉一樹漢安帝永初五年春葉落隨風飄入洛陽城其葉大常杉數十倍術士廉盛曰合浦東杉葉也此休徵當出王者帝遣使驗之信然乃以千人伐樹役夫多死者其後三百人坐斷株上食過足相容至今猶存荊寧浦有三種金荊可作枕紫荊堪作床白荊堪作履與他處牡荊蔓荊全異又彼境有社荊指病自愈節不相當者月暈時刻之與病人身齊等置床下雖危困亦愈紫藤葉細長莖如竹根極堅實重重有皮花白子黑置酒中歷二三十年亦不腐敗其莖截置煙炱中經時成紫香可以降神榼藤依樹蔓生如通草藤也其子紫黑色一名象豆三年方熟其殼眝藥歷年不壞生南海解諸藥毒蜜香𥿄以蜜香樹皮葉作之微褐色有紋如魚子極香而堅韌水漬之不潰爛泰康五年大秦獻三萬幅帝以萬幅賜鎮南大將軍當陽侯杜預令寫所撰春秋釋例及經傳集解以進未至而預卒詔賜其家令藏之抱香履抱木生於水松之旁若寄生然極柔弱不勝刀鋸乘濕時刳而為履易如削瓜既乾而韌不可理也履雖猥大而輕者若通脫木風至則隨飄而動夏月納之可禦蒸濕之氣出扶南大秦諸國泰康六年扶南貢百雙帝深歎異然哂其制作之陋但置諸外府以備方物而巳按東方朔瑣語曰木履起於晉文公時介之推逃祿自隱抱樹而死公撫木哀歎遂以為履每懷從亡之功輒俯視其履曰悲乎足下足下之稱亦自此始也
