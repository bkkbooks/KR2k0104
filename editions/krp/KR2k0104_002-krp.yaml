body:
  text: 南方草朩狀卷中晉嵇含撰楓人五嶺之間多楓朩嵗乆則生瘤癭一夕遇暴雷驟雨其樹贅暗長三五尺謂之楓人越巫取之作術有通神之驗取之不以法則能化去楓香樹似白楊葉圓而歧分有脂而香其子大如鴨卵二月華發乃著實八九月熟曝乾可燒惟九真郡有之薰陸香出大秦在海邊有大樹枝葉正如古松生於沙中盛夏樹膠流出沙上方採之榕樹南海桂林多植之葉如朩麻實如冬青樹幹拳曲是不可以為噐也其本稜理而深是不可以為材也燒之無焰是不可以為薪也以其不材故能乆而無傷其蔭十畆故人以為息焉而其枝條既繁葉又茂細軟條如藤垂下漸漸及地藤梢入土便生根節或一大株有根四五處而横枝及鄰樹即連理南人以為常不謂之瑞朩益智子如筆毫長七八分二月花色若蓮著實五六月熟味辛雜五味中芬芳亦可鹽曝出交趾合浦建安八年交州刺史張津嘗以益智子粽餉魏武帝桂出合浦生必以髙山之巔冬夏常青其類自為林間無雜樹交趾置桂園桂有三種葉如柏葉皮赤者為丹桂葉似柿葉者為菌桂其葉似枇杷葉者為牡桂三輔黄圖曰甘泉宫南有昆明池池中有靈波殿以桂為柱風來自香朱槿花莖葉皆如桑葉光而厚樹髙止四五尺而枝葉婆娑自二月開花至中冬即歇其花深紅色五出大如蜀葵有蘂一條長於花葉上綴金屑日光所爍疑若焰生一叢之上日開數百朶朝開暮落挿枝即活出髙凉郡一名赤槿一名日及指甲花其樹髙五六尺枝條柔弱葉如嫰榆與耶悉茗末利花皆雪白而香不相上下亦胡人自大秦國移植於南海而此花極繁細纔如半米粒許彼人多折置襟袖間葢資其芬馥爾一名散沫花蜜香沉香鷄骨香黄熟香棧香青桂香馬蹄香鷄舌香案此八物同出於一樹也交趾有蜜香樹榦似柜栁其花白而繁其葉如橘欲取香伐之經年其根榦枝節各有别色也朩心與節堅黒沉水者為沉香與水面平者為鷄骨香其根為黄熟香其榦為棧香細枝緊實未爛者為青桂香其根節輕而大者為馬蹄香其花不香成實乃香為鷄舌香珍異之朩也桄榔樹似栟櫚實其皮可作綆得水則柔韌胡人以此聨朩為舟皮中有屑如麫多者至數斛食之與常麫無異朩性如竹紫黒色有文理工人解之以製奕枰出九真交趾訶梨勒樹似朩梡花白子形如橄欖六路皮肉相著可作飲變白髭髪令黒出九真蘇材樹類槐花黒子出九真南人以染綘漬以大庾之水則色愈深水松葉如檜而細長出南海土産衆香而此朩不大香故彼人無佩服者嶺北人極愛之然其香殊勝在南方時植物無情者也不香於彼而香於此豈屈於不知巳而伸於知已者歟物理之難窮如此刺桐其朩為材三月三時布葉繁密後有花赤色間生葉間旁照他物皆朱殷然三五房凋則三五復發如是者竟嵗九真有之棹樹榦葉俱似椿以其葉鬻汁漬果呼為棹汁若以棹汁雜彘肉食者即時為雷震死棹出髙凉郡杉一名披煔合浦東二百里有杉一樹漢安帝永初五年春葉落隨風飄入洛陽城其葉大常杉數十倍術士㢘盛曰合浦東杉葉也此休徴當出王者帝遣使驗之信然乃以千人伐樹役夫多死者其後三百人坐斷株上食其廣足相容至今猶存荆寜浦有三種金荆可作枕紫荆堪作牀白荆堪作履與他處牡荆蔓荆全異又彼境有杜荆指病自愈節不相當者月暈時刻之與病人身齊等置牀下雖危困亦愈紫藤葉細長莖如竹根極堅實重重有皮花白子黒置酒中歴二三十年亦不腐敗其莖截置煙炱中經時成紫香可以降神榼藤依樹蔓生如通草藤也其子紫黒色一名象豆三年方熟其殻貯藥歴年不壊生南海解諸藥毒蜜香紙以蜜香樹皮葉作之微褐色有紋如魚子極香而堅韌水漬之不潰爛泰康五年大秦獻三萬幅嘗以萬幅賜鎮南大將軍當陽侯杜預令冩所撰春秋釋例及經𫝊集解以進未至而預卒詔賜其家令上之抱香履抱朩生於水松之旁若寄生然極柔弱不勝刀鋸乗濕時刳而為履易如削𤓰既乾則韌不可理也履雖猥大而輕者若通脫朩風至則隨飄而動夏月納之可禦蒸濕之氣出扶南大秦諸國泰康六年扶南貢百雙帝深歎異然哂其制作之陋但置諸外府以備方物而已按東方朔瑣語曰朩履起於晉文公時介之推逃禄自隠抱樹而死公撫朩哀歎遂以為履毎懷從亡之功輒俯視其履曰悲乎足下足下之稱亦自此始也南方草朩狀卷中
