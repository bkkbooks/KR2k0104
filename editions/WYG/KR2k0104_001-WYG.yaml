  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0104_WYG_001-1a, image: WYG0589/WYG0589-0002c.png}
body:
  text: 南方草木狀卷上晉嵇含撰南越交趾植物有四裔最為竒周秦以前無稱焉自漢武帝開拓封疆搜來珍異取其尤者充貢中州之人或昧其狀乃以所聞詮叙有禆子弟云爾甘蕉望之如樹株大者一圍餘葉長一丈或七八尺廣尺餘二尺許花大如酒杯形色如芙蓉著莖末百餘子大名為房相連累甜美亦可蜜藏根如芋魁大者如車轂實隨華每華一闔各有六子先後相次子不俱生花不俱落一名芭蕉或曰芭苴剥其子上皮色黄白味似蒲萄甜而脆亦療飢此有三種子大如拇指長而銳有類羊角名羊角蕉味最甘好一種子大如鷄卵有類牛乳名牛乳蕉味㣲減羊角一種大如藕子長六七寸形正方少甘最下也其莖解散如絲以灰練之可紡績為絺綌謂之蕉葛雖脆而好黄白不如葛赤色也交廣俱有之三輔黄圖曰漢武帝元鼎六年破南越建扶荔宫以植所得竒草異木有甘蕉二本耶悉茗花末利花皆胡人自西國移植於南海南人憐其芳香競植之陸賈南越行紀曰南越之境五穀無味百花不香此二花特芳香者縁自胡國移至不隨水土而變與夫橘北為枳異矣彼之女子以綵絲穿花心以為首飾末利花似薔蘼之白者香愈於耶悉茗豆䓻花其苗如蘆其葉似薑其花作穗嫰葉卷之而生花㣲紅穗頭深色葉漸舒花漸出舊說此花食之破氣消痰進酒増倍泰康二年交州貢一篚上試之有驗以賜近臣山薑花莖葉即薑也根不堪食於葉間吐花作穗如麥粒軟紅色煎服之治冷氣甚效出九真交趾鶴子草蔓生其花麴塵色淺紫蔕葉如柳而短當夏開花形如飛鶴觜翅尾足無所不備出南海云是媚草上有蟲老蛻為蝶赤黄色女子藏之謂之媚蝶能致其夫憐愛甘􅘂葢薯蕷之類或曰芋之類根葉亦如芋實如拳有大如甌者皮紫而肉白蒸鬻食之味如薯蕷性不甚冷舊珠崖之地海中之人皆不業耕稼惟掘地種甘􅘂秋熟收之蒸曬切如米粒倉圌貯之以充糧糗是名􅘂糧北方人至者或盛具牛豕膾炙而末以甘􅘂薦之若粳粟然大抵南人二毛者百無一二惟海中之人夀百餘歲者由不食五穀而食甘􅘂故爾花之美者有水蓮如蓮而莖紫柔而無刺水蕉如鹿葱或紫或黄吳永安中孫休嘗遣使取二花終不可致但圖畫以進蒟醬蓽茇也生於蕃國者大而紫謂之蓽茇生於畨禺者小而青謂之蒟焉可以為食故謂之醬焉交趾九真人家多種蔓生菖蒲畨禺東有澗澗中生菖蒲皆一寸九節安期生採服仙去但留玉舄焉留求子形如梔子稜瓣深而兩頭尖似訶梨勒而輕及半黄已熟中有肉白色甘如棗核大治嬰孺之疾南海交趾俱有之諸蔗一曰甘蔗交趾所生者圍數寸長丈餘頗似竹斷而食之甚甘笮取其汁曝數日成飴入口消釋彼人謂之石蜜吳孫亮使黄門以銀椀并葢就中藏吏取交州所獻甘蔗􅄳黄門先恨藏吏以䑕屎投􅄳中啟言吏不謹亮呼吏持錫器入問曰此器既葢之且有油覆無縁有此黄門將有恨汝吏叩頭曰嘗從臣求莞席臣以席有數不敢與亮曰必是此問之具服南人云甘蔗可消酒又名干蔗司馬相如樂歌曰泰尊柘漿析朝酲是其義也泰康六年扶南國貢諸蔗一丈三節草麴南海多美酒不用麴蘖但杵米粉雜以衆草葉冶葛汁􅎵溲之大如卵置蓬蒿中蔭蔽之經月而成用此合糯為酒故劇飲之既醒猶頭熱涔涔以其有毒草故也南人有女數嵗即大釀酒既漉候冬陂池竭時寘酒罌中宻固其上瘞陂中至春瀦水滿亦不復發矣女將嫁乃發陂取酒以供賀客謂之女酒其味絶美芒茅枯時瘴疫大作交廣皆爾也土人呼曰黄茅瘴又曰黄芒瘴南方冬無積藁瀕海郡邑多馬有草葉類梧桐而厚取以秣馬謂之肥馬草馬頗嗜而食果肥壯矣冬葉薑葉也苞苴物交廣皆用之南方地熱物易腐敗惟冬葉藏之乃可持乆蒲葵如栟櫚而柔薄可為葵笠出龍川藥有乞力伽术也瀕海所産一根有至數斤者劉涓子取以作煎令可丸餌之長生赬桐花嶺南處處有自初夏生至秋葢草也葉如桐其花連枝萼皆深紅之極者俗呼貞桐花貞音訛也水葱花葉皆如鹿葱花色有紅黄紫三種出始興婦人懐姙佩其花生男者即此花非鹿葱也交廣人佩之極有驗然其土多男不厭女子故不常佩也蕪菁嶺嶠已南俱無之偶有士人因官攜種就彼種之出地則變為芥亦橘種江北為枳之義也至曲江方有菘彼人謂之秦菘茄樹交廣草朩經冬不衰故蔬圃之中種茄宿根有三五年者漸長枝榦乃成大樹毎夏秋盛熟則梯樹採之五年後樹老子稀即伐去之别栽嫰者綽菜夏生於池沼間葉類茨菰根如藕條南海人食之云令人思睡呼為瞑菜蕹葉如落葵而小性冷味甘南人編葦為筏作小孔浮於水上種子於水中則如萍根浮水面及長莖葉皆出於葦筏孔中隨水上下南方之竒蔬也冶葛有大毒以蕹汁滴其苗當時萎死世𫝊魏武能噉冶葛至一尺云先食此菜冶葛毒草也蔓生葉如羅勒光而厚一名胡蔓草寘毒者多雜以生蔬進之悟者速以藥解不爾半日輒死山羊食其苗即肥而大亦如䑕食巴豆其大如㹠葢物類有相伏也吉利草其莖如金釵股形類石斛根類芍藥交廣俚俗多蓄蠱毒惟此草解之極驗吳黄武中江夏李俁以罪徙合浦始入境遇毒其奴吉利者偶得是草與俁服遂解吉利即遁去不知所之俁因此濟人不知其數遂以吉利為名豈李俁者徙非其罪或俁自有隠徳神明啟吉利者救之耶良耀草枝葉如麻黄秋結子如小栗煨食之解毒功用亞於吉利始者有得是藥者梁氏之子耀亦以為名梁轉為良爾花白似牛李出髙凉蕙草一名薫草葉如麻兩兩相對氣如蘼蕪可以止癘出南海凡草朩之華者春華者冬秀夏華者春秀秋華者夏秀冬華者秋秀其華竟嵗故婦女之首四時未嘗無華也南方草朩狀卷上
  hash: sha256:4a2dc9ed1b937b8bb88f37f97669e592ab11fbc9c753c6fa3a743fb115e15ba3
