body:
  text: 南方草木状地理類八雜記之屬提要臣等謹按南方草木状三卷晉嵇含撰含事蹟附載晉書嵇紹𫝊考隋志舊唐志俱有含集十卷隋志云其集已亡但附載郭象集下舊唐志仍著錄而不載此書至宋志始著錄觀此書載指甲花自大秦國移植南海是晉時已有此花而唐叚公路北户錄乃云指甲花本出外國梁大同二年始來中國知公路未見此書盖唐時尚不甚顯故史志不載也諸本但題譙國嵇含惟宋麻沙舊板前題曰永興元年十一月丙子振威将軍襄陽太守嵇含撰云云載其年月仕履頗為詳具盖舊本如是明人始刋削之然晉書恵帝本紀永寧二年正月改元永安七月改建武十一月復為永安十二月丁亥立豫章王熾為太弟始改永興是永興元年不得有十一月又永興二年正月甲午朔以干支推之丙子當在上年十二月中旬尚在改元前十二日其時亦未稱永興或其時改元之後併十二月一月皆追稱永興而輾轉𫝊刻又誤十二月為十一月歟惟隋志稱廣州太守嵇含而此作襄陽太守考書中所載皆嶺表之物則疑襄陽或誤題也其書凡分草朩果竹四類共八十種叙述典雅非唐以後人所能偽不得以始見宋志疑之其本亦最完整盖宋以後花譜地志援引者多其字句可以互校故獨尠訛闕焉乾隆四十三年九月㳟校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:07099831c41b16cc5c403f9d1479e45f570697fdcc9467b48aa642b6bc7f66ce
